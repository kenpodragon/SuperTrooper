<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" fill="#1a1a2e"/>
  <!-- Monitor outer frame -->
  <rect x="8" y="6" width="112" height="100" rx="8" fill="#3a3a5e"/>
  <!-- Screen -->
  <rect x="13" y="11" width="102" height="90" rx="4" fill="#16213e"/>
  <!-- Stand neck -->
  <rect x="60" y="106" width="8" height="6" fill="#3a3a5e"/>
  <!-- Stand base -->
  <rect x="50" y="112" width="28" height="4" fill="#3a3a5e"/>
  <!-- Hat crown -->
  <rect x="36" y="11" width="56" height="14" rx="3" fill="#00FF41"/>
  <!-- Hat band -->
  <rect x="36" y="22" width="56" height="3" fill="#00b42d" opacity="0.78"/>
  <!-- Hat brim -->
  <rect x="22" y="25" width="84" height="6" fill="#00FF41"/>
  <!-- Head -->
  <rect x="44" y="31" width="40" height="19" rx="4" fill="#00FF41"/>
  <!-- Left lens -->
  <rect x="46" y="36" width="14" height="8" rx="1" fill="#00280a"/>
  <rect x="46" y="36" width="14" height="8" rx="1" fill="none" stroke="#00FF41" stroke-width="2"/>
  <!-- Right lens -->
  <rect x="68" y="36" width="14" height="8" rx="1" fill="#00280a"/>
  <rect x="68" y="36" width="14" height="8" rx="1" fill="none" stroke="#00FF41" stroke-width="2"/>
  <!-- Bridge -->
  <line x1="60" y1="40" x2="68" y2="40" stroke="#00FF41" stroke-width="2"/>
  <!-- Shoulders -->
  <polygon points="52,50 76,50 84,58 94,72 34,72 44,58" fill="#00FF41"/>
  <!-- Collar lines -->
  <line x1="58" y1="54" x2="64" y2="62" stroke="#16213e" stroke-width="2"/>
  <line x1="70" y1="54" x2="64" y2="62" stroke="#16213e" stroke-width="2"/>
  <!-- Badge star -->
  <polygon points="64,60 65.5,64 70,64.5 66.8,67 67.8,71 64,68.8 60.2,71 61.2,67 58,64.5 62.5,64" fill="#16213e" stroke="#00FF41" stroke-width="0.8"/>
  <!-- Terminal cursor -->
  <rect x="18" y="90" width="14" height="3" fill="#00FF41"/>
</svg>
